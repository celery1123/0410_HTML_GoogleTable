<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表單練習</title>
    <script src="form.js"></script>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <section>
        <div class="formTitle">
            <div class="titleColor"></div>
            <h1 style="font-size: 24px; margin-left: 25px;">Google表單練習</h1>
             <small style="font-size: 14px; color:#757575; margin-left: 25px;">僅供新尖兵 F2E02 表單切版練習作業</small>
             <hr>
             <small style="font-size: 14px; color:#757575; margin-left: 25px;">誰的電子郵件</small>
             <a href="https://reurl.cc/K2eDER" style="font-size: 14px;">切換帳戶</a>
             <br>
             <small style="font-size: 14px; color:#757575; margin-left: 25px;">未共用的項目</small>
             <hr>
             <small style="font-size: 14px; color:red; margin-left: 25px;">* 表示必填問題</small>
             <br>
             <br>
            </div>
            <br>
        <form action="https://youtu.be/dQw4w9WgXcQ?si=Ck88aaJypcCSrBG8">
            <div class="answer">
                <label style="font-size: 18px;">姓名<span style="color: red;">*</span>
                    <br>
                    <br>
                    <input type="text" name="NAME" placeholder="您的回答" required 
                    style="height: 20px; width: 50%;" class="underline-input">
                </label>
            </div>
            <br>
            <div class="answer">
                <label style="font-size: 18px;">信箱<span style="color: red;">*</span>
                <br>
                <br>
                <input type="email" name="EMAIL" placeholder="您的回答" required 
                style="height: 20px; width: 50%; margin: auto;" class="underline-input">
            </label>
            </div>
            <br>
             <div class="answer">
                <label style="font-size: 18px;">生日
                <br>
                <small style="font-size: 12px; color:#757575">日期</small>
                <br>
                <br>
                    <input type="date" name="BIRTHDAY" class="underline-input"
                        style="height: 30px; width: 22%; margin: auto;">
             </label>
             </div>
            <br>
            <div class="answer">
                <label style="font-size: 18px;">想對老師說悄悄話
                <br>
                <br>
                <input type="textarea" name="MESSAGE" placeholder="您的回答"  
                        style="height: 20px; width: 100%; margin: auto;" class="underline-input">
             </label>
            </div>
            <br>
            <div class="answer answerColor">
                <label style="font-size: 18px;">喜歡的顏色</label>
                <br>
                <br>
                   <label>
                    <input type="radio" name="FAVORITE_COLOR" value="red" id="ColorType">
                       紅色
                   </label>
                   <br>
                   <br>
                   <label>
                    <input type="radio" name="FAVORITE_COLOR" value="blue" id="ColorType">
                       藍色
                   </label>
                   <br>
                   <br>
                   <label>
                    <input type="radio" name="FAVORITE_COLOR" value="green" id="ColorType">
                       綠色
                   </label>
            </div>
            <br>
            <div class="answer">
                <label style="font-size: 18px;">喜歡的飲食類型</label>
                <br>
                <br>
                   <label>
                       <input type="checkbox" name="FAVORITE_FOOD" value="chinese">
                       中式
                   </label>
                   <br>
                   <br>
                   <label>
                       <input type="checkbox" name="FAVORITE_FOOD" value="italian">
                       義式
                   </label>
                   <br>
                   <br>
                   <label>
                       <input type="checkbox" name="FAVORITE_FOOD" value="japanese">
                       日式
                   </label>
                   <br>
                   <br>
                   <label>
                       <input type="checkbox" name="FAVORITE_FOOD" value="korean">
                       韓式
                   </label>
                   <br>
                   <br>
                   <label>
                       <input type="checkbox" name="FAVORITE_FOOD" value="american">
                       美式
                   </label>
                   <br>
                   <br>
                   <label>
                       <input type="checkbox" name="FAVORITE_FOOD" value="thai">
                       泰式
                   </label>
            </div>
            <br>
            <div class="answer">
                <label style="font-size: 18px;">最想去的國家</label>
            <br>
            <br>
                <select name="COUNTRY" class="country">
                    <option value="" selected disabled>請選擇</option>
                    <optgroup label="亞洲">
                        <option value="japan">日本</option>
                        <option value="korea">韓國</option>
                        <option value="thailand">泰國</option>
                    </optgroup>
                    <optgroup label="歐洲">
                        <option value="italy">義大利</option>
                        <option value="france">英國</option>
                        <option value="germany">德國</option>
                    </optgroup>
                    <optgroup label="美洲">
                        <option value="usa">美國</option>
                        <option value="canada">加拿大</option>
                    </optgroup>
                </select>
            </div>
            <br>
            <div class="FormButton">
                <button type="submit"  class="summitButton">提交</button>
                <button type="reset" class="resetButton">清除表單</button>
            </div>
        </form>
        <form action="https://workspace.google.com/products/forms/?utm_source=product&utm_medium=forms_logo&utm_campaign=forms" target="_blank" class="pageEnd">
            <small style="font-size:12px; color: rgba(0,0,0,.66); float: left;">請勿使用Google表單送出密碼。</small>
            <br>
            <small style="font-size:12px; color: rgba(0,0,0,.66);">這份表單是在 五倍紅寶石程式資訊教育股份有限公司 中建立。</small>
            <br>
            <small style="font-size:12px; color: rgba(0,0,0,.66);">這份表單很可疑嗎？</small>
            <br>
            <input type="image" src="螢幕擷取畫面 2026-04-14 144439.png" alt="回報濫用" title="回報濫用" class="reportButton">
        </form>
    </section>
</body>
</html>
